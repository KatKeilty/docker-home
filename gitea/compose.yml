name: gitea
services:
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - USER_UID=${PUID}
      - USER_GID=${PGID}
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__DOMAIN=gitea.${TAILSCALE_DOMAIN}
      - GITEA__server__ROOT_URL=https://gitea.${TAILSCALE_DOMAIN}
      - GITEA__server__SSH_DOMAIN=gitea.${TAILSCALE_DOMAIN}
      - GITEA__server__PROTOCOL=http
      - GITEA__security__REVERSE_PROXY_LIMIT=2
      - GITEA__security__REVERSE_PROXY_TRUSTED_PROXIES=*
    ports:
      - "2222:22"

    volumes:
      - ./data:/data
    networks:
      - app-network

networks:
  app-network:
    external: true
