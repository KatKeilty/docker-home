name: paperless-ngx
services:
  paperless-broker:
    image: redis:8-alpine
    container_name: paperless-broker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - app-network

  paperless-db:
    image: postgres:16-alpine
    container_name: paperless-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=${PAPERLESS_DB_PASSWORD}
    volumes:
      - paperless-db:/var/lib/postgresql/data
    networks:
      - app-network

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - paperless-db
      - paperless-broker
    environment:
      - PAPERLESS_REDIS=redis://paperless-broker:6379
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${PAPERLESS_DB_PASSWORD}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_URL=https://paperless.${TAILSCALE_DOMAIN}
      - PAPERLESS_ALLOWED_HOSTS=paperless.${TAILSCALE_DOMAIN}
      - PAPERLESS_CORS_ALLOWED_HOSTS=https://paperless.${TAILSCALE_DOMAIN}
      - PAPERLESS_CSRF_TRUSTED_ORIGINS=https://paperless.${TAILSCALE_DOMAIN}
      - PAPERLESS_TIME_ZONE=${TZ}
      - PAPERLESS_OCR_LANGUAGE=eng
      - USERMAP_UID=${PUID}
      - USERMAP_GID=${PGID}
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD}
      - PAPERLESS_ADMIN_MAIL=${PAPERLESS_ADMIN_MAIL}
    volumes:
      - ./data:/usr/src/paperless/data:rw
      - ./media:/usr/src/paperless/media:rw
      - ./export:/usr/src/paperless/export:rw
      - ./consume:/usr/src/paperless/consume:rw
    networks:
      - app-network

networks:
  app-network:
    external: true

volumes:
  paperless-db:
