name: grocy

services:
  grocy:
    image: lscr.io/linuxserver/grocy:latest
    container_name: grocy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - GROCY_CURRENCY=${GROCY_CURRENCY}
    volumes:
      - ./data:/config
    networks: 
      - app-network

networks:
  app-network:
    external: true